<th:block th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
    <title>Subir Juego- GameVault</title>
<main class="container">
    <div class="panel" style="max-width: 600px; margin: 0 auto;">
        
        <h2 class="text-gradient" style="margin-top: 0;">Añadir Nuevo Juego</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">
            Sube la información y la portada de un nuevo juego a la bóveda.
        </p>

        <form th:action="${juego.id == null ? '/juegos' : '/juegos/editar/'+juego.id}"
              method="post"
              enctype="multipart/form-data">
            
            <div class="form-group">
                <label for="titulo" class="form-label">Título del Juego</label>
                <input type="text" id="titulo" name="titulo" required class="form-control" th:value="${juego.titulo}">
            </div>

            <div class="form-group">
                <label for="categoria" class="form-label">Categoria del Juego</label>
                <select id="categoria" name="categoria" required class="form-control">
                    <option value="" disabled th:selected="${juego.categoria == null}">Seleccione categoria</option>
                    <option value="Accion" th:selected="${juego.categoria == 'Accion'}">Accion</option>
                    <option value="Aventura" th:selected="${juego.categoria == 'Aventura'}">Aventura</option>
                    <option value="Shotter" th:selected="${juego.categoria == 'Shotter'}">Shotter</option>
                </select>
            </div>

            <div class="form-group">
                <label for="precio" class="form-label">Precio del Juego</label>
                <input type="number" id="precio" name="precio" required class="form-control" th:value="${juego.precio}">
            </div>
            <div class="form-group">
                <label for="descripcion" class="form-label">Descripción Breve</label>
                <textarea id="descripcion" name="descripcion" rows="4" required class="form-control" th:text="${juego.descripcion}" style="resize: vertical;"></textarea>
            </div>

            <div class="form-group" style="background-color: rgba(0,0,0,0.2); padding: 20px; border-radius: 8px; border: 1px dashed var(--primary);">
                <label for="portada" class="form-label" style="color: var(--primary);">
                    📸 Subir Portada (Imagen)
                </label>
                
                <input type="file" id="portada" name="portada" accept="image/*" th:required="${juego.id == null}" class="form-control" style="border: none; background: transparent; padding-left: 0;">
                       
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 10px; margin-bottom: 0;">
                    El tamaño máximo configurado en el servidor es de <b>2MB</b> por archivo.
                </p>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top: 10px; width: 100%;" th:text="${juego.id == null ? 'Guardar Juego' : 'Actualizar Juego'}">
                Guardar en la Bóveda
            </button>
        </form>
    </div>
</main>
</th:block>
